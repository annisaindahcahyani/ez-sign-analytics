services:
  # --- Service Engine (Punya Lo) ---
  engine:
    build: ./ezsign-engine
    container_name: ezsign_analytics_engine
    volumes:
      - ./ezsign-engine:/app
      - ./data:/data
    environment:
      - STAGING_PATH=/data/staging
      - PYTHONUNBUFFERED=1
      - DATABASE_PATH=/data/database.sqlite
    restart: always

# --- Service Frontend (Update Version!) ---
  frontend:
    build: ./ezsign-frontend
    container_name: ezsign_analytics_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./ezsign-frontend:/app    # <--- TAMBAHIN INI (Biar kodingan FE sync ke Docker)
      - /app/node_modules         # <--- TAMBAHIN INI (ZONASI AMAN: Biar pnpm Docker gak berantem sama laptop)
      - /app/.next                # <--- TAMBAHIN INI (ZONASI AMAN: Biar cache gak bentrok)
      - ./data:/app/data          # (Ini udah bener, buat jembatan titip file)
    depends_on:
      - engine