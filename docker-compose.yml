# =============================================================================
# 🐳 SERVICE ORCHESTRATION: EZSIGN ANALYTICS ENGINE & DASHBOARD
# =============================================================================
# 📌 CONFIGURATION : Multi-Container Docker Service Orchestrator
# 📅 UPDATE        : 5 Juni 2026
# 🛡️ OBJECTIVE     : Orkestrasi layanan backend (Engine) dan antarmuka (Dashboard)
# =============================================================================

version: '3.8'

services:
  # --- 1. ENGINE SERVICE (Data Ingestion & REST API Gateway Layer) ---
  # Bertanggung jawab atas proses ETL, ekstraksi metadata kriptografi ASN.1, 
  # dan sinkronisasi data transaksi verifikasi ke dalam arsitektur Star Schema.
  engine:
    build: ./ezsign-engine
    container_name: ezsign_analytics_engine
    
    # Eksposur gerbang REST API FastAPI agar dapat di-hit secara asinkron oleh Next.js/Frontend
    ports:
      - "8000:8000"
    
    # Sinkronisasi direktori lokal ke dalam kontainer untuk pengembangan aktif (Hot-Reload Deployment)
    volumes:
      - ./ezsign-engine:/app
      # Penyimpanan persisten murni (Shared Persistent Bind Mount) untuk SQLite & direktori staging
      - ./data:/data
    
    # Sinkronisasi konfigurasi environment terpusat agar kebal dari kebutaan konfigurasi runtime
    environment:
      - CORPORATE_CODE=ezsign
      - CORPORATE_NAME=PT Solusi Identitas Global Net
      - DATABASE_PATH=/data/database.sqlite
      - STAGING_PATH=/data/staging
      - INTEL_DATASET_PATH=/data/staging/intel_dataset.csv
      - PSRE_FILES_DIR=/data/staging/psre_files
      - PYTHONUNBUFFERED=1 # Mengaktifkan output log stream real-time pada terminal Docker logs
      
    restart: always

  # --- 2. DASHBOARD SERVICE (OLAP Analytics Visualization Interface) ---
  # Menyediakan antarmuka interaktif berbasis Streamlit untuk monitoring
  # tingkat kepercayaan dokumen (SAW/WP MADM Score) dan intelijen pasar kompetitor.
  dashboard:
    build:
      context: ./ezsign-engine
      dockerfile: dashboard/Dockerfile
    container_name: ezsign_analytics_dashboard
    
    ports:
      - "8501:8501" # Eksposur layanan dashboard UI melalui port forwarding 8501
    
    volumes:
      - ./ezsign-engine/dashboard:/app
      - ./data:/data # Berbagi akses volume storage yang sama untuk pembacaan data warehouse secara real-time
      - ./.streamlit:/app/.streamlit  # Tambahin baris ini
      
    environment:
      - DATABASE_PATH=/data/database.sqlite
      - STAGING_PATH=/data/staging
      - INTEL_DATASET_PATH=/data/staging/intel_dataset.csv
      - PSRE_FILES_DIR=/data/staging/psre_files
      
    # Dependency Check Control: Menjamin backend engine hidup sempurna sebelum dashboard UI di-render
    depends_on:
      - engine
      
    restart: always