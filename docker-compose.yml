version: '3.8'

services:
  # --- 1. SERVICE ENGINE (SI SATPAM DATA) ---
  engine:
    build: ./ezsign-engine
    container_name: ezsign_analytics_engine
    ports:
      - "0.0.0.0:3001:8000" # Biar API bisa diakses dari localhost:3001
    volumes:
      - ./ezsign-engine:/app
      - ./data:/data
    environment:
      - STAGING_PATH=/data/staging
      - PYTHONUNBUFFERED=1
      - DATABASE_PATH=/data/database.sqlite
    restart: always

  # --- 2. SERVICE DASHBOARD (SI DASHBOARD STREAMLIT) ---
  # Menggunakan Dockerfile yang ada di dalam folder ezsign-engine/dashboard
  dashboard:
    build: ./ezsign-engine/dashboard
    container_name: ezsign_analytics_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./ezsign-engine/dashboard:/app
      - ./data:/data  # Jembatan buat baca database.sqlite
    depends_on:
      - engine
    restart: always

  # --- 3. SERVICE FRONTEND (SI WAJAH PUBLIK) ---
  frontend:
    build: ./ezsign-frontend
    container_name: ezsign_analytics_frontend
    ports:
      - "0.0.0.0:3000:3000" # Biar bisa dibuka di localhost:3000
      - "3000:3000"
    volumes:
      - ./ezsign-frontend:/app
      - /app/node_modules  # Zonasi aman biar gak bentrok library laptop vs docker
      - /app/.next        # Biar cache development gak bikin berat
      - ./data:/app/data   # Jembatan buat titip file PDF ke staging
    depends_on:
      - engine
    restart: always

volumes:
  data: