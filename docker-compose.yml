services:
  # --- 1. ENGINE (SATPAM DATA) ---
  engine:
    build: ./ezsign-engine
    container_name: ezsign_analytics_engine
    volumes:
      - ./ezsign-engine:/app
      - ./data:/data
    environment:
      - STAGING_PATH=/data/staging
      - PYTHONUNBUFFERED=1
      - DATABASE_PATH=/data/database.sqlite
    restart: always

  # --- 2. DASHBOARD (STREAMLIT) ---
  dashboard:
    build:
      context: ./ezsign-engine
      dockerfile: dashboard/Dockerfile
    container_name: ezsign_analytics_dashboard
    ports:
      - "8501:8501"
    volumes:
      - ./ezsign-engine/dashboard:/app
      - ./data:/data
    depends_on:
      - engine
    restart: always

volumes:
  data: